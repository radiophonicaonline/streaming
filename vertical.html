<nav class="menu-container">
  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

<style>
  .menu-container {
    position: sticky;
    top: 0;
    z-index: 1000;
    background-color: #000000cc;
    backdrop-filter: blur(6px);
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .menu-toggle {
    font-size: 24px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 12px;
    display: block;
  }

  .menu-items {
    display: none;
    flex-direction: column;
    background: #000000dd;
    position: absolute;
    top: 60px;
    right: 10px;
    border-radius: 10px;
    overflow: hidden;
    min-width: 150px;
    transition: all 0.3s ease;
  }

  .menu-items a {
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    font-weight: bold;
    border-bottom: 1px solid #ffffff22;
    display: block;
  }

  .menu-items a:hover {
    background: #ffffff22;
  }

  /* En pantallas grandes mostrar como barra normal */
  @media (min-width: 768px) {
    .menu-toggle {
      display: none;
    }

    .menu-items {
      display: flex !important;
      position: static;
      flex-direction: row;
      background: transparent;
      min-width: unset;
    }

    .menu-items a {
      border: none;
    }
  }
</style>
<body>
  <div id="cargando">Cargando reproductor...</div>

  <script type="module">
    // Importar Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // Tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAC-9LQSlelDVx27wd2DPxisi4M-lRwtrk",
      authDomain: "contador-de-personas-5f8aa.firebaseapp.com",
      projectId: "contador-de-personas-5f8aa",
      storageBucket: "contador-de-personas-5f8aa.appspot.com",
      messagingSenderId: "1063230344919",
      appId: "1:1063230344919:web:ed86a937ba176dddb1aa92",
      databaseURL: "https://contador-de-personas-5f8aa-default-rtdb.firebaseio.com"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Escuchar el valor del url vertical
    const urlRef = ref(db, 'urlvertical');
    onValue(urlRef, (snapshot) => {
      const url = snapshot.val();
      if (url) {
        const iframe = document.createElement('iframe');
        iframe.src = url;
        document.body.innerHTML = ''; // Borra "Cargando..."
        document.body.appendChild(iframe);
      } else {
        document.getElementById('cargando').innerText = "No se encontró el URL del reproductor.";
      }
    });
  </script>
</body>
