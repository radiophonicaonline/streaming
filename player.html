<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
transition:opacity 1s linear;
}

#v1{opacity:1}
#v2{opacity:0}
</style>
</head>

<body>

<video id="v1" autoplay></video>
<video id="v2"></video>

<video id="fx" style="display:none"></video>

<script>

const canal = new BroadcastChannel("obs_player");

const v1=document.getElementById("v1");
const v2=document.getElementById("v2");
const fx=document.getElementById("fx");

let active=1;
let autoplay=true;

let folderFiles=[];
let currentFile=null;
let nextFile=null;

/* CROSSFADE */

function crossfade(src){

const current=active===1?v1:v2;
const next=active===1?v2:v1;

next.src=src;
next.volume=current.volume;

next.currentTime=0;

next.play();

next.style.opacity=1;
current.style.opacity=0;

active=active===1?2:1;

}

/* ARCHIVO */

function playFile(file){

folderFiles=[];

currentFile=file;

const src=URL.createObjectURL(file);

crossfade(src);

}

/* CARPETA */

function playFolder(files){

folderFiles=files;

pickNext();

playCurrent();

}

function pickNext(){

if(!folderFiles.length)return;

let i=Math.floor(Math.random()*folderFiles.length);

nextFile=folderFiles[i];

}

/* reproducir actual */

function playCurrent(){

if(!nextFile)return;

currentFile=nextFile;

const src=URL.createObjectURL(currentFile);

crossfade(src);

/* elegir siguiente */

pickNext();

/* avisar al panel */

canal.postMessage({
type:"previewNext",
name:nextFile.name,
url:URL.createObjectURL(nextFile)
});

}

/* FIN VIDEO */

function getCurrent(){
return active===1?v1:v2;
}

v1.onended=onEnd;
v2.onended=onEnd;

function onEnd(){

if(!autoplay)return;

if(folderFiles.length){

playCurrent();

}else{

canal.postMessage({type:"next"});

}

}

/* FX */

function playFX(file){

fx.src=URL.createObjectURL(file);

fx.volume=getCurrent().volume;

fx.onended=()=>{
fx.src="";
};

fx.play();

}

/* CONTROLES */

function play(){getCurrent().play();}
function pause(){getCurrent().pause();}
function stop(){getCurrent().pause();getCurrent().currentTime=0}

/* MENSAJES */

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "playFolder":
playFolder(d.files);
break;

case "fx":
playFX(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "setAutoplay":
autoplay=d.value;
break;

case "volume":
v1.volume=d.value;
v2.volume=d.value;
fx.volume=d.value;
break;

}

};

</script>
</body>
</html>
