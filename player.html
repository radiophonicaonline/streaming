<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
transition:opacity 0.8s linear;
}

#v1{opacity:1}
#v2{opacity:0}
</style>
</head>

<body>

<video id="v1" autoplay></video>
<video id="v2"></video>

<video id="fx" style="display:none"></video>

<script>

const canal = new BroadcastChannel("obs_player");

const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");
const fx = document.getElementById("fx");

let active = 1;
let autoplay = true;
let folderFiles = [];

/* ===== UTIL ===== */

function current(){
return active===1 ? v1 : v2;
}

function hidden(){
return active===1 ? v2 : v1;
}

/* ===== LIMPIAR VIDEO ===== */

function clearVideo(v){

v.pause();
v.removeAttribute("src");
v.load();

}

/* ===== CROSSFADE ===== */

function crossfade(file){

const cur = current();
const nxt = hidden();

/* limpiar video oculto */

clearVideo(nxt);

nxt.src = URL.createObjectURL(file);
nxt.volume = cur.volume;

nxt.currentTime = 0;

nxt.play().catch(()=>{});

nxt.style.opacity = 1;
cur.style.opacity = 0;

/* detener video anterior */

setTimeout(()=>{
clearVideo(cur);
},800);

active = active===1 ? 2 : 1;

}

/* ===== PLAY ARCHIVO ===== */

function playFile(file){

folderFiles = [];

crossfade(file);

}

/* ===== PLAY CARPETA ===== */

function playFolder(files){

folderFiles = files;

playRandom();

}

function playRandom(){

if(!folderFiles.length) return;

const i = Math.floor(Math.random()*folderFiles.length);

crossfade(folderFiles[i]);

}

/* ===== FIN VIDEO ===== */

v1.onended = onEnd;
v2.onended = onEnd;

function onEnd(){

if(!autoplay) return;

if(folderFiles.length){

playRandom();

}else{

canal.postMessage({type:"next"});

}

}

/* ===== FX ===== */

function playFX(file){

fx.pause();

fx.src = URL.createObjectURL(file);
fx.volume = current().volume;

fx.play().catch(()=>{});

}

/* ===== CONTROLES ===== */

function play(){
current().play().catch(()=>{});
}

function pause(){
current().pause();
}

function stop(){

clearVideo(v1);
clearVideo(v2);

}

/* ===== MENSAJES ===== */

canal.onmessage = e => {

const d = e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "playFolder":
playFolder(d.files);
break;

case "fx":
playFX(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "setAutoplay":
autoplay = d.value;
break;

case "volume":
v1.volume = d.value;
v2.volume = d.value;
fx.volume = d.value;
break;

}

};

</script>

</body>
</html>
