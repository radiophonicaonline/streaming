<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
}
</style>
</head>

<body>

<video id="main" autoplay></video>
<video id="fx" style="display:none"></video>

<script>

const canal = new BroadcastChannel("obs_player");

const main = document.getElementById("main");
const fx = document.getElementById("fx");

let active = "main";
let autoplay = true;

/* =====================
CROSSFADER
===================== */

function crossfadeTo(file){

let current = active === "main" ? main : fx;
let next = active === "main" ? fx : main;

next.src = URL.createObjectURL(file);
next.style.display="block";

next.volume = 0;
next.play();

let fade = 0;

const interval = setInterval(()=>{

fade += 0.05;

next.volume = fade;
current.volume = 1 - fade;

if(fade >= 1){

clearInterval(interval);

current.pause();
current.src="";
current.style.display="none";

active = (active === "main") ? "fx" : "main";

}

},50);

}

/* =====================
PLAY
===================== */

function playFile(file){

if(!main.src && !fx.src){
main.src = URL.createObjectURL(file);
main.volume = 1;
main.play();
active="main";
return;
}

crossfadeTo(file);

}

/* =====================
FX (ARREGLADO)
===================== */

function playFX(file){

const fxPlayer = document.createElement("video");

fxPlayer.src = URL.createObjectURL(file);
fxPlayer.style.position="absolute";
fxPlayer.style.width="100%";
fxPlayer.style.height="100%";
fxPlayer.style.objectFit="cover";

fxPlayer.volume = (active==="main"?main.volume:fx.volume);

document.body.appendChild(fxPlayer);

fxPlayer.onended=()=>{
fxPlayer.remove();
};

fxPlayer.play();

}

/* =====================
TIME UPDATE
===================== */

setInterval(()=>{

let activeVideo = active === "main" ? main : fx;

if(!activeVideo || !activeVideo.duration) return;

canal.postMessage({
type:"timeUpdate",
current: activeVideo.currentTime,
duration: activeVideo.duration
});

},500);

/* =====================
END
===================== */

main.onended = fx.onended = ()=>{

if(!autoplay) return;

canal.postMessage({ type:"next" });

};

/* =====================
CONTROLES
===================== */

function play(){ main.play(); fx.play(); }
function pause(){ main.pause(); fx.pause(); }

function stop(){
main.pause(); fx.pause();
main.src=""; fx.src="";
}

/* =====================
MENSAJES
===================== */

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "fx":
playFX(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "volume":
main.volume=d.value;
fx.volume=d.value;
break;

case "setAutoplay":
autoplay=d.value;
break;

case "forward":
(main.currentTime += 10);
break;

case "back":
(main.currentTime -= 10);
break;

case "seek":

let activeVideo = active === "main" ? main : fx;

if(activeVideo.duration){
activeVideo.currentTime = (d.value/100) * activeVideo.duration;
}

break;

}

};

</script>

</body>
</html>
