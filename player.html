<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
}
</style>

</head>

<body>

<video id="main" autoplay></video>

<script>

const canal = new BroadcastChannel("obs_player");
const main = document.getElementById("main");

let autoplay=true;

function playFile(file){

main.src = URL.createObjectURL(file);
main.play();

}

main.onended=()=>{

if(!autoplay) return;

canal.postMessage({type:"next"});

};

function play(){ main.play(); }

function pause(){ main.pause(); }

function stop(){

main.pause();
main.currentTime=0;

}

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "setAutoplay":
autoplay=d.value;
break;

case "volume":
main.volume=d.value;
break;

}

};

</script>

</body>
</html>
