<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
transition:opacity 1s;
}

#videoA{opacity:1;}
#videoB{opacity:0;}
</style>
</head>

<body>

<video id="videoA"></video>
<video id="videoB"></video>

<audio id="fx"></audio>

<script>

let playlist=[]
let currentIndex=0

let videoA=document.getElementById("videoA")
let videoB=document.getElementById("videoB")
let fx=document.getElementById("fx")

let active="A"

let crossfade=true

window.addEventListener("message",(e)=>{

let d=e.data

if(d.type==="playlist"){
playlist=d.list
currentIndex=0
playIndex(currentIndex)
}

if(d.type==="playIndex"){
currentIndex=d.index
playIndex(currentIndex)
}

if(d.type==="next"){
next()
}

if(d.type==="prev"){
prev()
}

if(d.type==="fx"){
playFX(d.url)
}

if(d.type==="volume"){
videoA.volume=d.value
videoB.volume=d.value
}

})

function playIndex(i){

let item=playlist[i]
if(!item)return

if(item.type==="folder"){
let r=Math.floor(Math.random()*item.files.length)
loadVideo(item.files[r])
}else{
loadVideo(item.url)
}

}

function loadVideo(url){

let v1=active==="A"?videoA:videoB
let v2=active==="A"?videoB:videoA

v2.src=url
v2.currentTime=0
v2.play()

if(crossfade){

v2.style.opacity=1
v1.style.opacity=0

setTimeout(()=>{
v1.pause()
},1000)

}else{

v1.pause()
v1.style.opacity=0
v2.style.opacity=1

}

active=active==="A"?"B":"A"

v2.onended=()=>{
next()
}

}

function next(){

currentIndex++

if(currentIndex>=playlist.length){
currentIndex=0
}

playIndex(currentIndex)

}

function prev(){

currentIndex--

if(currentIndex<0){
currentIndex=playlist.length-1
}

playIndex(currentIndex)

}

function playFX(url){

fx.src=url
fx.currentTime=0
fx.play()

}

</script>

</body>
</html>
