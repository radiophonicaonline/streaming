<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
}

/* 🔥 NOW PLAYING OVERLAY */

#nowPlaying{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
color:#6cf;
padding:8px 12px;
font-family:Segoe UI;
font-size:16px;
border-radius:6px;
opacity:0;
transition:0.5s;
}
</style>
</head>

<body>

<video id="main" autoplay></video>
<video id="fx" style="display:none"></video>

<div id="nowPlaying"></div>

<script>

const canal = new BroadcastChannel("obs_player");

const main = document.getElementById("main");
const fx = document.getElementById("fx");
const nowPlaying = document.getElementById("nowPlaying");

let autoplay = true;
let lastURL = null;

/* =====================
   LIMPIAR MEMORIA
===================== */

function limpiarVideo(){

if(lastURL){
URL.revokeObjectURL(lastURL);
lastURL = null;
}

}

/* =====================
   NOW PLAYING
===================== */

function mostrarNowPlaying(text){

nowPlaying.textContent = text;

nowPlaying.style.opacity = 1;

setTimeout(()=>{
nowPlaying.style.opacity = 0;
},4000);

}

/* =====================
   PLAY FILE
===================== */

function playFile(file){

limpiarVideo();

const url = URL.createObjectURL(file);
lastURL = url;

main.src = url;
main.play();

mostrarNowPlaying(file.name);

}

/* =====================
   PLAY URL (🔥 NUEVO)
===================== */

function playUrl(url){

limpiarVideo();

main.src = url;
main.play();

const name = url.split("/").pop();

mostrarNowPlaying(name);

}

/* =====================
   FX
===================== */

function playFX(file){

const url = URL.createObjectURL(file);

fx.src = url;

fx.style.display="block";

fx.volume = main.volume;

fx.onended=()=>{
fx.style.display="none";
URL.revokeObjectURL(url);
};

fx.play();

}

/* =====================
   CUANDO TERMINA
===================== */

main.onended=()=>{

if(!autoplay) return;

canal.postMessage({
type:"next"
});

};

/* =====================
   CONTROLES
===================== */

function play(){ main.play(); }
function pause(){ main.pause(); }

function stop(){
main.pause();
main.currentTime=0;
}

/* =====================
   MENSAJES PANEL
===================== */

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "playUrl":
playUrl(d.url);
break;

case "fx":
playFX(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "volume":
main.volume=d.value;
fx.volume=d.value;
break;

case "setAutoplay":
autoplay=d.value;
break;

case "forward":
main.currentTime += 10;
break;

case "back":
main.currentTime -= 10;
break;
}

};

</script>

</body>
</html>
