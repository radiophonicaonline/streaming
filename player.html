<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
}

/* 🔥 PROGRESS BAR */
#progressContainer{
position:absolute;
bottom:0;
left:0;
width:100%;
height:6px;
background:#222;
z-index:10;
cursor:pointer;
}

#progressBar{
height:100%;
width:0%;
background:#4caf50;
}

#timeLabel{
position:absolute;
bottom:8px;
right:10px;
color:#aaa;
font-size:12px;
z-index:10;
background:rgba(0,0,0,0.5);
padding:2px 6px;
}
</style>
</head>

<body>

<video id="main" autoplay></video>
<video id="fx" style="display:none"></video>

<!-- 🔥 PROGRESS UI -->
<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div id="timeLabel">0:00 / 0:00</div>

<script>

const canal = new BroadcastChannel("obs_player");

const main = document.getElementById("main");
const fx = document.getElementById("fx");

const progressBar = document.getElementById("progressBar");
const timeLabel = document.getElementById("timeLabel");
const progressContainer = document.getElementById("progressContainer");

let autoplay = true;

/* =====================
   PLAY VIDEO
===================== */

function playFile(file){
main.src = URL.createObjectURL(file);
main.play();
}

/* =====================
   FX
===================== */

function playFX(file){

fx.src = URL.createObjectURL(file);
fx.style.display="block";
fx.volume = main.volume;

fx.onended=()=>{
fx.style.display="none";
};

fx.play();
}

/* =====================
   PROGRESS REAL
===================== */

main.ontimeupdate = () => {

if(!main.duration) return;

const percent = (main.currentTime / main.duration) * 100;
progressBar.style.width = percent + "%";

timeLabel.textContent =
formatTime(main.currentTime) + " / " + formatTime(main.duration);
};

function formatTime(t){
const m = Math.floor(t/60);
const s = Math.floor(t%60);
return m + ":" + (s<10?"0":"") + s;
}

/* CLICK PARA ADELANTAR */
progressContainer.onclick = (e) => {

const rect = progressContainer.getBoundingClientRect();
const x = e.clientX - rect.left;
const percent = x / rect.width;

main.currentTime = percent * main.duration;
};

/* =====================
   CUANDO TERMINA
===================== */

main.onended=()=>{

if(!autoplay) return;

canal.postMessage({
type:"next"
});

};

/* =====================
   CONTROLES
===================== */

function play(){ main.play(); }
function pause(){ main.pause(); }

function stop(){
main.pause();
main.currentTime=0;
}

/* =====================
   MENSAJES PANEL
===================== */

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile":
playFile(d.file);
break;

case "fx":
playFX(d.file);
break;

case "play":
play();
break;

case "pause":
pause();
break;

case "stop":
stop();
break;

case "volume":
main.volume=d.value;
fx.volume=d.value;
break;

case "setAutoplay":
autoplay=d.value;
break;

case "forward":
main.currentTime += 10;
break;

case "back":
main.currentTime -= 10;
break;
}

};

</script>

</body>
</html>
