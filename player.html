<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:black;
}
</style>
</head>

<body>

<video id="main" autoplay></video>
<video id="fx" style="display:none"></video>

<script>

const canal = new BroadcastChannel("obs_player");

const main = document.getElementById("main");
const fx = document.getElementById("fx");

let active = "main";
let autoplay = true;

/* ===================== */

function getActiveVideo(){
return active === "main" ? main : fx;
}

/* ===================== */

function crossfadeTo(file){

let current = getActiveVideo();
let next = active === "main" ? fx : main;

next.src = URL.createObjectURL(file);
next.style.display="block";
next.volume = 0;
next.play();

let fade = 0;

const interval = setInterval(()=>{

fade += 0.05;

next.volume = fade;
current.volume = 1 - fade;

if(fade >= 1){

clearInterval(interval);

current.pause();
current.src="";
current.style.display="none";

active = (active === "main") ? "fx" : "main";

}

},50);

}

/* ===================== */

function playFile(file){

if(!main.src && !fx.src){
main.src = URL.createObjectURL(file);
main.play();
active="main";
return;
}

crossfadeTo(file);

}

/* ===================== FX */

function playFX(file){

const v=document.createElement("video");

v.src = URL.createObjectURL(file);
v.style.position="absolute";
v.style.width="100%";
v.style.height="100%";
v.style.objectFit="cover";

v.volume = getActiveVideo().volume;

document.body.appendChild(v);

v.onended=()=>v.remove();

v.play();

}

/* ===================== TIME */

setInterval(()=>{

let v = getActiveVideo();

if(!v.duration) return;

canal.postMessage({
type:"timeUpdate",
current:v.currentTime,
duration:v.duration
});

},500);

/* ===================== END */

main.onended = fx.onended = ()=>{
if(autoplay) canal.postMessage({type:"next"});
};

/* ===================== */

canal.onmessage=e=>{

const d=e.data;

switch(d.type){

case "playFile": playFile(d.file); break;
case "fx": playFX(d.file); break;

case "play": main.play(); fx.play(); break;
case "pause": main.pause(); fx.pause(); break;

case "stop":
main.pause(); fx.pause();
main.src=""; fx.src="";
break;

case "volume":
main.volume=d.value;
fx.volume=d.value;
break;

case "forward": getActiveVideo().currentTime+=10; break;
case "back": getActiveVideo().currentTime-=10; break;

case "seek":
let v=getActiveVideo();
if(v.duration){
v.currentTime=(d.value/100)*v.duration;
}
break;

}

};

</script>

</body>
</html>
