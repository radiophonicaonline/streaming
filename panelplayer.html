<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{
background:#444;
}

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{
background:#184a8b;
}

.fxbtn{
background:#7a0d0d;
padding:5px;
margin:3px;
cursor:pointer;
}

#previewVideo{
width:100%;
background:black;
}

</style>
</head>

<body>

<h3>Playlist</h3>

<h3>NOW PLAYING</h3>
<div id="nowPlaying" style="color:#6cf">ninguno</div>

<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>

<label>
<input type="checkbox" id="auto" checked>Auto
</label>

<div id="lista"></div>

<h3>Preview</h3>

<video id="previewVideo" controls></video>
<div id="previewName">sin preview</div>

<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<hr>

<h3>Controles</h3>

<button onclick="playerPlay()">▶</button>
<button onclick="playerPause()">⏸</button>
<button onclick="playerStop()">⏹</button>

<button onclick="back10()">⏪</button>
<button onclick="forward10()">⏩</button>

<br><br>

<h3>Tiempo</h3>

<span id="currentTime">0:00</span>

<input type="range" id="progress" min="0" max="100" value="0"
oninput="seekVideo(this.value)">

<span id="duration">0:00</span>

<br>

<button onclick="prevVideo()">⏮</button>
<button onclick="nextVideo()">⏭</button>

<br><br>

Volumen
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume(this.value)">

<h3>FX</h3>

<button onclick="cargarFX()">Cargar FX</button>
<div id="fx"></div>

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" multiple hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;
let previewItemData=null;

const lista=document.getElementById("lista");
const previewVideo=document.getElementById("previewVideo");
const fxdiv=document.getElementById("fx");

/* ===================== */

function formatTime(t){
const m=Math.floor(t/60);
const s=Math.floor(t%60);
return m+":"+(s<10?"0"+s:s);
}

/* ===================== */

canal.onmessage=e=>{

if(e.data.type==="next"){
currentIndex++;
if(currentIndex>=items.length) currentIndex=0;
playItem(currentIndex);
}

if(e.data.type==="timeUpdate"){

document.getElementById("currentTime").textContent = formatTime(e.data.current);
document.getElementById("duration").textContent = formatTime(e.data.duration);

document.getElementById("progress").value =
(e.data.current / e.data.duration) * 100;

}

};

/* ===================== */

function playItem(i){

currentIndex=i;
const it=items[i];

document.getElementById("nowPlaying").textContent = it.name;

canal.postMessage({
type:"playFile",
file: it.type==="file" ? it.file :
it.files[Math.floor(Math.random()*it.files.length)]
});

}

/* ===================== */

function preview(i){

const it=items[i];

const file = it.type==="file" ? it.file :
it.files[Math.floor(Math.random()*it.files.length)];

previewVideo.src=URL.createObjectURL(file);

previewItemData={
file:file,
name:file.name
};

document.getElementById("previewName").textContent=file.name;

previewVideo.play();

}

/* ===================== */

function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* ===================== */

files.onchange=e=>{
for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista(); // 🔥 ESTA ES LA CLAVE
};

folder.onchange=e=>{

const files=[...e.target.files];

const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista(); // 🔥 CLAVE
};
/* ===================== */

function cargarFX(){ fxfiles.click(); }

fxfiles.onchange=e=>{
for(const f of e.target.files){

const btn=document.createElement("div");
btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{
canal.postMessage({
type:"fx",
file:f
});
};

fxdiv.appendChild(btn);

}
};
function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

div.appendChild(span);
lista.appendChild(div);

});

}
/* ===================== */

function playerPlay(){ canal.postMessage({type:"play"}); }
function playerPause(){ canal.postMessage({type:"pause"}); }
function playerStop(){ canal.postMessage({type:"stop"}); }

function forward10(){ canal.postMessage({type:"forward"}); }
function back10(){ canal.postMessage({type:"back"}); }

function nextVideo(){ canal.postMessage({type:"next"}); }
function prevVideo(){ canal.postMessage({type:"prev"}); }

function seekVideo(v){
canal.postMessage({type:"seek",value:v});
}

function setVolume(v){
canal.postMessage({type:"volume",value:parseFloat(v)});
}

</script>

</body>
</html>
