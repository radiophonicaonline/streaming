<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{ background:#444; }

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{ background:#184a8b; }

.fxbtn{
background:#7a0d0d;
padding:5px;
margin:3px;
cursor:pointer;
}

#previewVideo{
width:100%;
background:black;
}

#previewLista{
border:1px solid #333;
padding:5px;
max-height:150px;
overflow:auto;
margin-top:5px;
}
</style>
</head>

<body>

<h3>Playlist</h3>

<h3>NOW PLAYING</h3>
<div id="nowPlaying" style="color:#6cf;font-size:14px">
ninguno
</div>

<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>

<label>
<input type="checkbox" id="auto" checked>Auto
</label>

<div id="lista"></div>

<h3>Preview</h3>

<video id="previewVideo" controls></video>

<div id="previewName" style="font-size:13px;color:#aaa;margin-top:4px">
sin preview
</div>

<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<!-- 🆕 LISTA AUXILIAR -->
<h3>Preview List</h3>
<div id="previewLista"></div>

<hr>

<h3>Controles Player</h3>

<button onclick="playerPlay()">▶</button>
<button onclick="playerPause()">⏸</button>
<button onclick="playerStop()">⏹</button>

<button onclick="back10()">⏪ 10s</button>
<button onclick="forward10()">10s ⏩</button>

<br><br>

Volumen
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume(this.value)">

<h3>FX</h3>

<button onclick="cargarFX()">Cargar FX</button>
<div id="fx"></div>

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" multiple hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewItemData=null;

/* 🆕 LISTA AUXILIAR */
let previewList=[];

const lista=document.getElementById("lista");
const previewLista=document.getElementById("previewLista");

const previewVideo=document.getElementById("previewVideo");
const fxdiv=document.getElementById("fx");

const files=document.getElementById("files");
const folder=document.getElementById("folder");
const fxfiles=document.getElementById("fxfiles");

/* ===================== LISTA PRINCIPAL ===================== */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

/* 👉 CLICK DERECHO = PREVIEW (SE MANTIENE) */
span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

const botones=document.createElement("div");

/* 🆕 AGREGAR A PREVIEW LIST */
const addPreview=document.createElement("button");
addPreview.textContent="➕";
addPreview.onclick=()=>{

if(it.type==="file"){
previewList.push({
file:it.file,
name:it.file.name
});
}else{
const f=it.files[Math.floor(Math.random()*it.files.length)];
previewList.push({
file:f,
name:f.name
});
}

actualizarPreviewLista();

};

const up=document.createElement("button");
up.textContent="▲";
up.onclick=()=>{
if(i===0) return;
[items[i],items[i-1]]=[items[i-1],items[i]];
actualizarLista();
};

const down=document.createElement("button");
down.textContent="▼";
down.onclick=()=>{
if(i===items.length-1) return;
[items[i],items[i+1]]=[items[i+1],items[i]];
actualizarLista();
};

const copy=document.createElement("button");
copy.textContent="⧉";
copy.onclick=()=>{
items.splice(i+1,0,structuredClone(it));
actualizarLista();
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
items.splice(i,1);
actualizarLista();
};

botones.append(addPreview,up,down,copy,del);

div.append(span,botones);
lista.appendChild(div);

});

}

/* ===================== PLAY ===================== */

function playItem(i){

if(items.length===0) return;

currentIndex=i;

const it=items[i];

if(it.type==="file"){

document.getElementById("nowPlaying").textContent = it.name;

canal.postMessage({
type:"playFile",
file:it.file
});

}else{

if(!it.shuffleList || it.shuffleList.length===0){

it.shuffleList=[...it.files];

for(let j=it.shuffleList.length-1;j>0;j--){
const k=Math.floor(Math.random()*(j+1));
[it.shuffleList[j],it.shuffleList[k]]=[it.shuffleList[k],it.shuffleList[j]];
}

it.shuffleIndex=0;
}

const f=it.shuffleList[it.shuffleIndex];

it.shuffleIndex++;

if(it.shuffleIndex>=it.shuffleList.length){
it.shuffleList=null;
}

document.getElementById("nowPlaying").textContent = f.name;

canal.postMessage({
type:"playFile",
file:f
});

}

actualizarLista();

}

/* ===================== PREVIEW ===================== */

function preview(i){

const it=items[i];

if(it.type==="file"){

previewVideo.src=URL.createObjectURL(it.file);

previewItemData={
file:it.file,
name:it.file.name
};

}else{

const f=it.files[Math.floor(Math.random()*it.files.length)];

previewVideo.src=URL.createObjectURL(f);

previewItemData={
file:f,
name:f.name
};

}

document.getElementById("previewName").textContent=previewItemData.name;
previewVideo.play();

}

/* ===================== PREVIEW LIST ===================== */

function actualizarPreviewLista(){

previewLista.innerHTML="";

previewList.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>{

previewVideo.src=URL.createObjectURL(it.file);
previewVideo.play();

previewItemData=it;
document.getElementById("previewName").textContent=it.name;

};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
previewList.splice(i,1);
actualizarPreviewLista();
};

div.append(span,del);
previewLista.appendChild(div);

});

}

/* ===================== CUE ===================== */

function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* ===================== RESTO ===================== */

function stopPreview(){
previewVideo.pause();
previewVideo.src="";
}

canal.onmessage=e=>{
if(e.data.type==="next"){
if(items.length===0) return;
currentIndex++;
if(currentIndex>=items.length) currentIndex=0;
playItem(currentIndex);
}
};

function cargarVideos(){ files.click(); }

files.onchange=e=>{
for(const f of e.target.files){
items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});
}
actualizarLista();
};

function cargarCarpeta(){ folder.click(); }

folder.onchange=e=>{
const fileList=[...e.target.files];
if(fileList.length===0) return;

const name=fileList[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:fileList
});

actualizarLista();
};

function cargarFX(){ fxfiles.click(); }

fxfiles.onchange=e=>{
for(const f of e.target.files){
const btn=document.createElement("div");
btn.className="fxbtn";
btn.textContent=f.name;
btn.onclick=()=>{
canal.postMessage({type:"fx",file:f});
};
fxdiv.appendChild(btn);
}
};

function playerPlay(){ canal.postMessage({type:"play"}); }
function playerPause(){ canal.postMessage({type:"pause"}); }
function playerStop(){ canal.postMessage({type:"stop"}); }
function forward10(){ canal.postMessage({type:"forward"}); }
function back10(){ canal.postMessage({type:"back"}); }

function setVolume(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}

</script>

</body>
</html>
