<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI, sans-serif;
padding:12px;
}

button{
background:#2a2a2a;
color:#fff;
border:none;
padding:6px 10px;
margin:3px;
cursor:pointer;
border-radius:4px;
font-size:13px;
}

button:hover{background:#444}

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
font-size:13px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:4px 6px;
border-bottom:1px solid #1c1c1c;
}

.item:hover{background:#1a1a1a}

.playing{
background:#113a1c !important;
}

.item span{
cursor:pointer;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:200px;
}

/* preview player */

#previewPanel{
margin-top:10px;
background:#000;
border:1px solid #333;
padding:6px;
width:260px;
}

#previewPanel video{
width:100%;
background:black;
}

#previewControls{
margin-top:4px;
}

#previewControls button{
font-size:12px;
padding:4px 6px;
}

.fxbtn{
display:inline-block;
background:#7a0d0d;
padding:6px 8px;
margin:4px;
cursor:pointer;
border-radius:4px;
font-size:12px;
}

.fxbtn:hover{background:#a31212}

</style>
</head>

<body>

<h3>🎬 Playlist</h3>

<button onclick="cargarVideos()">➕ Videos</button>
<button onclick="cargarCarpeta()">📂 Carpeta</button>

<label>
<input type="checkbox" id="auto" checked> Auto
</label>

<div id="lista"></div>

<h3>🎮 Navegación</h3>

<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="random()">🔀</button>

<h3>🎛️ Controles</h3>

<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="stop()">⏹</button>

<h3>🔊 Volumen</h3>

<input type="range"
min="0"
max="1"
step="0.01"
value="1"
oninput="setVol(this.value)">

<hr>

<h3>🔊 FX / Jingles</h3>

<button onclick="cargarFX()">➕ Cargar FX</button>
<div id="fx"></div>

<hr>

<h3>🎧 Preview Manual</h3>

<div id="previewPanel">

<video id="previewPlayer"></video>

<div id="previewControls">

<button onclick="previewPlay()">▶</button>
<button onclick="previewPause()">⏸</button>
<button onclick="previewStop()">⏹</button>
<button onclick="sendToAir()">📡 Enviar al aire</button>

</div>

</div>

<input type="file" id="files" accept="video/*" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" accept="audio/*,video/*" multiple hidden>

<script>

const canal = new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewFile=null;

const lista=document.getElementById("lista");
const previewPlayer=document.getElementById("previewPlayer");

/* LISTA */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)div.classList.add("playing");

const span=document.createElement("span");
span.textContent=it.name;

/* CLICK NORMAL = AIR */

span.onclick=()=>reproducirItem(i);

/* CLICK DERECHO = PREVIEW */

span.oncontextmenu=e=>{

e.preventDefault();

if(it.type!=="file")return;

previewFile=it.file;

previewPlayer.src=URL.createObjectURL(it.file);

previewPlayer.play();

};

div.appendChild(span);

lista.appendChild(div);

});

}

/* REPRODUCIR */

function reproducirItem(i){

currentIndex=i;

const it=items[i];

if(it.type==="file"){

canal.postMessage({
type:"playFile",
file:it.file
});

}else{

canal.postMessage({
type:"playFolder",
files:it.files
});

}

actualizarLista();

}

/* PREVIEW CONTROLES */

function previewPlay(){
previewPlayer.play();
}

function previewPause(){
previewPlayer.pause();
}

function previewStop(){

previewPlayer.pause();
previewPlayer.currentTime=0;

}

/* ENVIAR AL AIRE */

function sendToAir(){

if(!previewFile)return;

canal.postMessage({
type:"playFile",
file:previewFile
});

}

/* NAVEGACIÓN */

function next(){

let i=currentIndex+1;

if(i>=items.length)i=0;

reproducirItem(i);

}

function prev(){

let i=currentIndex-1;

if(i<0)i=items.length-1;

reproducirItem(i);

}

function random(){

let i=Math.floor(Math.random()*items.length);

reproducirItem(i);

}

/* CARGAS */

function cargarVideos(){
document.getElementById("files").click();
}

function cargarCarpeta(){
document.getElementById("folder").click();
}

function cargarFX(){
document.getElementById("fxfiles").click();
}

document.getElementById("files").onchange=e=>{

for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista();

};

document.getElementById("folder").onchange=e=>{

const files=[...e.target.files];
const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista();

};

/* FX */

document.getElementById("fxfiles").onchange=e=>{

for(const f of e.target.files){

const btn=document.createElement("div");

btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{
canal.postMessage({
type:"fx",
file:f
});
};

document.getElementById("fx").appendChild(btn);

}

};

/* CONTROLES */

function play(){canal.postMessage({type:"play"});}
function pause(){canal.postMessage({type:"pause"});}
function stop(){canal.postMessage({type:"stop"});}

function setVol(v){

canal.postMessage({
type:"volume",
value:parseFloat(v)
});

}

document.getElementById("auto").onchange=e=>{

canal.postMessage({
type:"setAutoplay",
value:e.target.checked
});

};

canal.onmessage=e=>{

const d=e.data;

if(d.type==="next"){
next();
}

};

</script>

</body>
</html>
