<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{ background:#444; }

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{ background:#184a8b; }

#previewVideo{
width:100%;
background:black;
}

#previewLista{
border:1px solid #333;
padding:5px;
max-height:150px;
overflow:auto;
margin-top:5px;
}
</style>
</head>

<body>

<h3>Playlist</h3>

<h3>NOW PLAYING</h3>
<div id="nowPlaying" style="color:#6cf;font-size:14px">
ninguno
</div>

<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>
<button onclick="borrarLista()">🗑 Limpiar lista</button>

<label>
<input type="checkbox" id="auto" checked>Auto
</label>

<div id="lista"></div>

<h3>Preview</h3>

<video id="previewVideo" controls></video>

<div id="previewName" style="font-size:13px;color:#aaa;margin-top:4px">
sin preview
</div>

<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<br><br>

<!-- 🔥 NUEVOS BOTONES -->
<button onclick="agregarPreviewArchivo()">➕ Archivo Preview</button>
<button onclick="agregarPreviewCarpeta()">📂 Carpeta Preview</button>

<h3>Preview List</h3>
<div id="previewLista"></div>

<hr>

<h3>Controles Player</h3>

<button onclick="playerPlay()">▶</button>
<button onclick="playerPause()">⏸</button>
<button onclick="playerStop()">⏹</button>

<button onclick="back10()">⏪ 10s</button>
<button onclick="forward10()">10s ⏩</button>

<br><br>

Volumen
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume(this.value)">

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>

<input type="file" id="previewFiles" multiple hidden>
<input type="file" id="previewFolder" webkitdirectory hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewItemData=null;
let previewList=[];

const lista=document.getElementById("lista");
const previewLista=document.getElementById("previewLista");

const previewVideo=document.getElementById("previewVideo");

const files=document.getElementById("files");
const folder=document.getElementById("folder");

const previewFiles=document.getElementById("previewFiles");
const previewFolder=document.getElementById("previewFolder");

/* ===================== BORRAR LISTA ===================== */

function borrarLista(){
items=[];
currentIndex=-1;
actualizarLista();
}

/* ===================== LISTA ===================== */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
items.splice(i,1);
actualizarLista();
};

div.append(span,del);
lista.appendChild(div);

});

}

/* ===================== PLAY ===================== */

function playItem(i){

if(items.length===0) return;

currentIndex=i;

const it=items[i];

document.getElementById("nowPlaying").textContent = it.name;

canal.postMessage({
type:"playFile",
file:it.file
});

actualizarLista();
}

/* ===================== PREVIEW ===================== */

function preview(i){

const it=items[i];

previewVideo.src=URL.createObjectURL(it.file);

previewItemData=it;

document.getElementById("previewName").textContent=it.name;
previewVideo.play();
}

/* ===================== PREVIEW LIST ===================== */

function actualizarPreviewLista(){

previewLista.innerHTML="";

previewList.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>{
previewVideo.src=URL.createObjectURL(it.file);
previewVideo.play();
previewItemData=it;
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
previewList.splice(i,1);
actualizarPreviewLista();
};

div.append(span,del);
previewLista.appendChild(div);

});

}

/* ===================== AGREGAR A PREVIEW ===================== */

function agregarPreviewArchivo(){
previewFiles.click();
}

previewFiles.onchange=e=>{
for(const f of e.target.files){
previewList.push({file:f,name:f.name});
}
actualizarPreviewLista();
};

function agregarPreviewCarpeta(){
previewFolder.click();
}

previewFolder.onchange=e=>{
for(const f of e.target.files){
previewList.push({file:f,name:f.name});
}
actualizarPreviewLista();
};

/* ===================== CUE ===================== */

function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* ===================== RESTO ===================== */

function stopPreview(){
previewVideo.pause();
previewVideo.src="";
}

function cargarVideos(){ files.click(); }

files.onchange=e=>{
for(const f of e.target.files){
items.push({file:f,name:f.name});
}
actualizarLista();
};

function cargarCarpeta(){ folder.click(); }

function playerPlay(){ canal.postMessage({type:"play"}); }
function playerPause(){ canal.postMessage({type:"pause"}); }
function playerStop(){ canal.postMessage({type:"stop"}); }
function forward10(){ canal.postMessage({type:"forward"}); }
function back10(){ canal.postMessage({type:"back"}); }

function setVolume(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}

</script>

</body>
</html>
