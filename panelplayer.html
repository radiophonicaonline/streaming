<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{ background:#444; }

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{ background:#184a8b; }

#previewVideo{
width:100%;
background:black;
}

#previewLista{
border:1px solid #333;
padding:5px;
max-height:150px;
overflow:auto;
margin-top:5px;
}
</style>
</head>

<body>

<h3>Playlist</h3>

<h3>NOW PLAYING</h3>
<div id="nowPlaying">ninguno</div>

<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>
<button onclick="borrarLista()">🗑 Limpiar lista</button>

<div id="lista"></div>

<h3>Preview</h3>
<video id="previewVideo" controls></video>

<div id="previewName">sin preview</div>

<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<br><br>

<button onclick="agregarPreviewArchivo()">➕ Archivo Preview</button>
<button onclick="agregarPreviewCarpeta()">📂 Carpeta Preview</button>

<h3>Preview List</h3>
<div id="previewLista"></div>

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>

<input type="file" id="previewFiles" multiple hidden>
<input type="file" id="previewFolder" webkitdirectory hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewItemData=null;
let previewList=[];

const lista=document.getElementById("lista");
const previewLista=document.getElementById("previewLista");

const previewVideo=document.getElementById("previewVideo");

const files=document.getElementById("files");
const folder=document.getElementById("folder");

const previewFiles=document.getElementById("previewFiles");
const previewFolder=document.getElementById("previewFolder");

/* 🔥 BORRAR LISTA */
function borrarLista(){
items=[];
currentIndex=-1;
actualizarLista();
}

/* 🔥 LISTA COMPLETA RESTAURADA */
function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

const botones=document.createElement("div");

/* 🔼 */
const up=document.createElement("button");
up.textContent="▲";
up.onclick=()=>{
if(i===0) return;
[items[i],items[i-1]]=[items[i-1],items[i]];
actualizarLista();
};

/* 🔽 */
const down=document.createElement("button");
down.textContent="▼";
down.onclick=()=>{
if(i===items.length-1) return;
[items[i],items[i+1]]=[items[i+1],items[i]];
actualizarLista();
};

/* 📄 COPIAR */
const copy=document.createElement("button");
copy.textContent="⧉";
copy.onclick=()=>{
items.splice(i+1,0,structuredClone(it));
actualizarLista();
};

/* ❌ */
const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
items.splice(i,1);
actualizarLista();
};

botones.append(up,down,copy,del);

div.append(span,botones);
lista.appendChild(div);

});

}

/* PLAY */
function playItem(i){

if(items.length===0) return;

currentIndex=i;

const it=items[i];

document.getElementById("nowPlaying").textContent = it.name;

canal.postMessage({
type:"playFile",
file:it.file
});

actualizarLista();
}

/* PREVIEW */
function preview(i){

const it=items[i];

previewVideo.src=URL.createObjectURL(it.file);

previewItemData=it;

document.getElementById("previewName").textContent=it.name;
previewVideo.play();
}

/* PREVIEW LIST */
function actualizarPreviewLista(){

previewLista.innerHTML="";

previewList.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>{
previewVideo.src=URL.createObjectURL(it.file);
previewVideo.play();
previewItemData=it;
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
previewList.splice(i,1);
actualizarPreviewLista();
};

div.append(span,del);
previewLista.appendChild(div);

});

}

/* AGREGAR PREVIEW */
function agregarPreviewArchivo(){
previewFiles.click();
}

previewFiles.onchange=e=>{
for(const f of e.target.files){
previewList.push({file:f,name:f.name});
}
actualizarPreviewLista();
};

function agregarPreviewCarpeta(){
previewFolder.click();
}

previewFolder.onchange=e=>{
for(const f of e.target.files){
previewList.push({file:f,name:f.name});
}
actualizarPreviewLista();
};

/* CUE */
function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* RESTO */
function stopPreview(){
previewVideo.pause();
previewVideo.src="";
}

function cargarVideos(){ files.click(); }

files.onchange=e=>{
for(const f of e.target.files){
items.push({file:f,name:f.name});
}
actualizarLista();
};

function cargarCarpeta(){ folder.click(); }

</script>

</body>
</html>
