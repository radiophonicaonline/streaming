<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  background:#0b0b0b;
  color:#eee;
  font-family:Segoe UI, sans-serif;
  padding:12px;
}

button{
  background:#2a2a2a;
  color:#fff;
  border:none;
  padding:6px 10px;
  margin:3px;
  cursor:pointer;
  border-radius:4px;
  font-size:13px;
}

button:hover{ background:#444 }

#lista{
  height:260px;
  overflow-y:auto;
  border:1px solid #222;
  margin-top:8px;
  font-size:13px;
}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 6px;
  border-bottom:1px solid #1c1c1c;
}

.item:hover{ background:#1a1a1a }

.item.playing{
  background:#0f3a1f;
}

.item span{
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:220px;
}

.controls button{
  padding:3px 6px;
  font-size:11px;
}

.fxbtn{
  display:inline-block;
  background:#7a0d0d;
  padding:6px 8px;
  margin:4px;
  cursor:pointer;
  border-radius:4px;
  font-size:12px;
}

.fxbtn:hover{ background:#a31212 }
</style>
</head>

<body>

<h3>🎬 Playlist</h3>

<button onclick="cargarVideos()">➕ Videos</button>
<button onclick="cargarCarpeta()">📂 Carpeta</button>

<label>
<input type="checkbox" id="auto" checked> Auto
</label>

<div id="lista"></div>

<h3>🎮 Navegación</h3>

<button onclick="prev()">⏮ Anterior</button>
<button onclick="next()">⏭ Siguiente</button>
<button onclick="random()">🔀 Aleatorio</button>

<h3>🎛️ Controles</h3>

<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="stop()">⏹</button>

<h3>🔊 Volumen</h3>

<input type="range"
min="0" max="1" step="0.01"
value="1"
oninput="setVol(this.value)">

<hr>

<h3>🔊 FX / Jingles</h3>

<button onclick="cargarFX()">➕ Cargar FX</button>
<div id="fx"></div>

<input type="file" id="files" accept="video/*" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" accept="audio/*,video/*" multiple hidden>

<script>

const canal = new BroadcastChannel("obs_player");

let items = [];
let currentIndex = -1;

const lista = document.getElementById("lista");
const fxdiv = document.getElementById("fx");

function actualizarLista(){

  lista.innerHTML="";

  items.forEach((it,i)=>{

    const div=document.createElement("div");
    div.className="item";

    if(i===currentIndex){
      div.classList.add("playing");
    }

    const span=document.createElement("span");
    span.textContent=it.name;
    span.onclick=()=>reproducirItem(i);

    const controls=document.createElement("div");
    controls.className="controls";

    const up=document.createElement("button");
    up.textContent="⬆";
    up.onclick=()=>moverArriba(i);

    const down=document.createElement("button");
    down.textContent="⬇";
    down.onclick=()=>moverAbajo(i);

    const copy=document.createElement("button");
    copy.textContent="📄";
    copy.onclick=()=>copiarItem(i);

    const del=document.createElement("button");
    del.textContent="✖";
    del.onclick=()=>{
      items.splice(i,1);
      if(currentIndex===i) currentIndex=-1;
      actualizarLista();
    };

    controls.appendChild(up);
    controls.appendChild(down);
    controls.appendChild(copy);
    controls.appendChild(del);

    div.appendChild(span);
    div.appendChild(controls);

    lista.appendChild(div);

  });

}

/* REPRODUCIR ITEM */

function reproducirItem(i){

  if(i<0 || i>=items.length) return;

  currentIndex=i;

  const it=items[i];

  if(it.type==="file"){
    canal.postMessage({
      type:"playFile",
      file:it.file
    });
  }else{
    canal.postMessage({
      type:"playFolder",
      files:it.files
    });
  }

  actualizarLista();
}

/* MOVER */

function moverArriba(i){

  if(i===0) return;

  const temp=items[i];
  items[i]=items[i-1];
  items[i-1]=temp;

  if(currentIndex===i) currentIndex=i-1;
  else if(currentIndex===i-1) currentIndex=i;

  actualizarLista();
}

function moverAbajo(i){

  if(i===items.length-1) return;

  const temp=items[i];
  items[i]=items[i+1];
  items[i+1]=temp;

  if(currentIndex===i) currentIndex=i+1;
  else if(currentIndex===i+1) currentIndex=i;

  actualizarLista();
}

/* COPIAR */

function copiarItem(i){

  const it=items[i];

  if(it.type==="file"){
    items.splice(i+1,0,{
      type:"file",
      name:it.name+" (copy)",
      file:it.file
    });
  }else{
    items.splice(i+1,0,{
      type:"folder",
      name:it.name+" (copy)",
      files:it.files
    });
  }

  actualizarLista();
}

/* NAVEGACIÓN */

function next(){

  if(!items.length) return;

  let i=currentIndex+1;

  if(i>=items.length) i=0;

  reproducirItem(i);
}

function prev(){

  if(!items.length) return;

  let i=currentIndex-1;

  if(i<0) i=items.length-1;

  reproducirItem(i);
}

function random(){

  if(!items.length) return;

  const i=Math.floor(Math.random()*items.length);

  reproducirItem(i);
}

/* CARGAS */

function cargarVideos(){
document.getElementById("files").click();
}

function cargarCarpeta(){
document.getElementById("folder").click();
}

function cargarFX(){
document.getElementById("fxfiles").click();
}

document.getElementById("files").onchange=e=>{

for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista();

};

document.getElementById("folder").onchange=e=>{

const files=[...e.target.files];

const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista();

};

/* FX */

document.getElementById("fxfiles").onchange=e=>{

for(const f of e.target.files){

const btn=document.createElement("div");
btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{
canal.postMessage({
type:"fx",
file:f
});
};

fxdiv.appendChild(btn);

}

};

/* CONTROLES */

function play(){
canal.postMessage({type:"play"});
}

function pause(){
canal.postMessage({type:"pause"});
}

function stop(){
canal.postMessage({type:"stop"});
}

function setVol(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}

document.getElementById("auto").onchange=e=>{
canal.postMessage({
type:"setAutoplay",
value:e.target.checked
});
};

/* PLAYER PIDE SIGUIENTE */

canal.onmessage = e => {

const d = e.data;

if(d.type === "next"){
next();
}

};

</script>

</body>
</html>
