<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{
background:#444;
}

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{
background:#184a8b;
}

.fxbtn{
background:#7a0d0d;
padding:5px;
margin:3px;
cursor:pointer;
}

#previewVideo{
width:100%;
background:black;
}

</style>
</head>

<body>

<h3>Playlist</h3>
<h3>NOW PLAYING</h3>
<div id="nowPlaying" style="color:#6cf;font-size:14px">
ninguno
</div>
<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>

<label>
<input type="checkbox" id="auto" checked>Auto
</label>

<div id="lista"></div>

<h3>Preview</h3>

<video id="previewVideo" controls></video>
<div id="previewName" style="font-size:13px;color:#aaa;margin-top:4px">
sin preview
</div>
<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<hr>
<h3>Controles Player</h3>

<button onclick="playerPlay()">▶</button>
<button onclick="playerPause()">⏸</button>
<button onclick="playerStop()">⏹</button>

<button onclick="back10()">⏪ 10s</button>
<button onclick="forward10()">10s ⏩</button>

<br><br>

Volumen
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume(this.value)">
<h3>FX</h3>

<button onclick="cargarFX()">Cargar FX</button>

<div id="fx"></div>

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" multiple hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewItemData=null;

const lista=document.getElementById("lista");

const previewVideo=document.getElementById("previewVideo");

const fxdiv=document.getElementById("fx");

/* =====================
LISTA
===================== */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

const botones=document.createElement("div");

const up=document.createElement("button");
up.textContent="▲";
up.onclick=()=>{
if(i===0) return;
[items[i],items[i-1]]=[items[i-1],items[i]];
actualizarLista();
};

const down=document.createElement("button");
down.textContent="▼";
down.onclick=()=>{
if(i===items.length-1) return;
[items[i],items[i+1]]=[items[i+1],items[i]];
actualizarLista();
};

const copy=document.createElement("button");
copy.textContent="⧉";
copy.onclick=()=>{
items.splice(i+1,0,structuredClone(it));
actualizarLista();
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
items.splice(i,1);
actualizarLista();
};

botones.append(up,down,copy,del);

div.append(span,botones);

lista.appendChild(div);

});

}

/* =====================
PLAY
===================== */

function playItem(i){

currentIndex=i;

const it=items[i];

/* MOSTRAR NOMBRE EN PANEL */

document.getElementById("nowPlaying").textContent = it.name;

if(it.type==="file"){

canal.postMessage({
type:"playFile",
file:it.file
});

}else{

const r=Math.floor(Math.random()*it.files.length);

const f=it.files[r];

document.getElementById("nowPlaying").textContent = f.name;

canal.postMessage({
type:"playFile",
file:f
});

}

actualizarLista();

}

/* =====================
PREVIEW
===================== */

function preview(i){

const it=items[i];

if(it.type==="file"){

previewVideo.src=URL.createObjectURL(it.file);

previewItemData={
type:"file",
file:it.file,
name:it.file.name
};

}else{

const r=Math.floor(Math.random()*it.files.length);

const f=it.files[r];

previewVideo.src=URL.createObjectURL(f);

previewItemData={
type:"file",
file:f,
name:f.name
};

}

document.getElementById("previewName").textContent=previewItemData.name;

previewVideo.play();

}

/* =====================
CUE
===================== */

function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* =====================
STOP PREVIEW
===================== */

function stopPreview(){

previewVideo.pause();
previewVideo.src="";

}

/* =====================
AUTOPLAY
===================== */

canal.onmessage=e=>{

if(e.data.type==="next"){

currentIndex++;

if(currentIndex>=items.length)
currentIndex=0;

playItem(currentIndex);

}

};

/* =====================
CARGAR VIDEOS
===================== */

function cargarVideos(){
files.click();
}

files.onchange=e=>{

for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista();

};

/* =====================
CARPETA
===================== */

function cargarCarpeta(){
folder.click();
}

folder.onchange=e=>{

const files=[...e.target.files];

const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista();

};

/* =====================
FX
===================== */

function cargarFX(){
fxfiles.click();
}

fxfiles.onchange=e=>{

for(const f of e.target.files){

const btn=document.createElement("div");

btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{

canal.postMessage({
type:"fx",
file:f
});

};

fxdiv.appendChild(btn);

}

};
function playerPlay(){
canal.postMessage({type:"play"});
}

function playerPause(){
canal.postMessage({type:"pause"});
}

function playerStop(){
canal.postMessage({type:"stop"});
}

function forward10(){
canal.postMessage({type:"forward"});
}

function back10(){
canal.postMessage({type:"back"});
}

function setVolume(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}
  document.addEventListener("keydown",e=>{

if(e.target.tagName==="INPUT") return;

switch(e.key){

case " ":
playerPlay();
break;

case "p":
playerPause();
break;

case "s":
playerStop();
break;

case "ArrowRight":
forward10();
break;

case "ArrowLeft":
back10();
break;

case "n":
canal.postMessage({type:"next"});
break;

}

});
</script>

</body>
</html>
