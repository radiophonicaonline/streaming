<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  background:#0b0b0b;
  color:#eee;
  font-family:Segoe UI, sans-serif;
  padding:12px;
}

/* BOTONES */

button{
  background:#2a2a2a;
  color:#fff;
  border:none;
  padding:6px 10px;
  margin:3px;
  cursor:pointer;
  border-radius:4px;
  font-size:13px;
}

button:hover{ background:#444 }

/* LISTA */

#lista{
  height:260px;
  overflow-y:auto;
  border:1px solid #222;
  margin-top:8px;
  font-size:13px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:4px 6px;
  border-bottom:1px solid #1c1c1c;
}

.item:hover{ background:#1a1a1a }

.item span{
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:240px;
}

/* ITEM ACTIVO */

.active{
  background:#184a8b !important;
}

/* FX */

.fxbtn{
  display:inline-block;
  background:#7a0d0d;
  padding:6px 8px;
  margin:4px;
  cursor:pointer;
  border-radius:4px;
  font-size:12px;
}

.fxbtn:hover{ background:#a31212 }

/* PREVIEW */

#previewBox{
  margin-top:10px;
  border:1px solid #333;
  padding:6px;
}

#previewVideo{
  width:100%;
  background:#000;
}

#previewTitle{
  font-size:12px;
  margin-top:4px;
  color:#aaa;
}

</style>
</head>

<body>

<h3>🎬 Playlist</h3>

<button onclick="cargarVideos()">➕ Videos</button>
<button onclick="cargarCarpeta()">📂 Carpeta</button>

<label>
<input type="checkbox" id="auto" checked> Auto
</label>

<div id="lista"></div>

<h3>🎮 Navegación</h3>

<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="random()">🔀</button>

<h3>🎛️ Controles</h3>

<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="stop()">⏹</button>

<h3>🔊 Volumen</h3>

<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVol(this.value)">

<hr>

<h3>🔊 FX / Jingles</h3>

<button onclick="cargarFX()">➕ Cargar FX</button>
<div id="fx"></div>

<hr>

<h3>🎥 Preview</h3>

<div id="previewBox">

<video id="previewVideo" controls></video>

<div id="previewTitle">sin preview</div>

<button onclick="mandarAlAire()">▶ CUE → AIR</button>
<button onclick="stopPreview()">⏹ STOP PREVIEW</button>

</div>

<input type="file" id="files" accept="video/*" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" accept="audio/*,video/*" multiple hidden>

<script>

const canal = new BroadcastChannel("obs_player");

let items = [];
let currentIndex = -1;
let previewIndex = -1;

const lista = document.getElementById("lista");
const fxdiv = document.getElementById("fx");

const previewVideo = document.getElementById("previewVideo");
const previewTitle = document.getElementById("previewTitle");

/* ===== LISTA ===== */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

/* CLICK IZQUIERDO = PLAY */

span.onclick=()=>{
reproducirItem(i);
};

/* CLICK DERECHO = PREVIEW */

span.oncontextmenu=e=>{
e.preventDefault();
previewItem(i);
};

const del=document.createElement("button");
del.textContent="✖";

del.onclick=()=>{
items.splice(i,1);
actualizarLista();
};

div.appendChild(span);
div.appendChild(del);

lista.appendChild(div);

});

}

/* ===== REPRODUCIR ===== */

function reproducirItem(i){

if(i<0 || i>=items.length) return;

currentIndex=i;

const it=items[i];

if(it.type==="file"){
canal.postMessage({
type:"playFile",
file:it.file
});
}
else{
canal.postMessage({
type:"playFolder",
files:it.files
});
}

actualizarLista();

}

/* ===== PREVIEW ===== */

function previewItem(i){

previewIndex=i;

const it=items[i];

previewTitle.textContent="Preview: "+it.name;

if(it.type==="file"){

previewVideo.src=URL.createObjectURL(it.file);
previewVideo.play();

}else{

const f=it.files[0];

previewVideo.src=URL.createObjectURL(f);
previewVideo.play();

}

}

function stopPreview(){

previewVideo.pause();
previewVideo.src="";

previewTitle.textContent="sin preview";

}

/* ===== MANDAR PREVIEW AL AIRE ===== */

function mandarAlAire(){

if(previewIndex===-1) return;

reproducirItem(previewIndex);

}

/* ===== NAVEGACIÓN ===== */

function next(){

if(!items.length) return;

let i=currentIndex+1;

if(i>=items.length) i=0;

reproducirItem(i);

}

function prev(){

if(!items.length) return;

let i=currentIndex-1;

if(i<0) i=items.length-1;

reproducirItem(i);

}

function random(){

if(!items.length) return;

const i=Math.floor(Math.random()*items.length);

reproducirItem(i);

}

/* ===== CARGAR VIDEOS ===== */

function cargarVideos(){
document.getElementById("files").click();
}

document.getElementById("files").onchange=e=>{

for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista();

};

/* ===== CARGAR CARPETA ===== */

function cargarCarpeta(){
document.getElementById("folder").click();
}

document.getElementById("folder").onchange=e=>{

const files=[...e.target.files];

const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista();

};

/* ===== FX ===== */

function cargarFX(){
document.getElementById("fxfiles").click();
}

document.getElementById("fxfiles").onchange=e=>{

for(const f of e.target.files){

const btn=document.createElement("div");

btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{
canal.postMessage({
type:"fx",
file:f
});
};

fxdiv.appendChild(btn);

}

};

/* ===== CONTROLES ===== */

function play(){
canal.postMessage({type:"play"});
}

function pause(){
canal.postMessage({type:"pause"});
}

function stop(){
canal.postMessage({type:"stop"});
}

function setVol(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}

document.getElementById("auto").onchange=e=>{
canal.postMessage({
type:"setAutoplay",
value:e.target.checked
});
};

/* ===== PLAYER PIDE SIGUIENTE ===== */

canal.onmessage=e=>{

const d=e.data;

if(d.type==="next"){
next();
}

};

</script>

</body>
</html>
