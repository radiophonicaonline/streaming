<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Player</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
}

button{
margin:4px;
padding:6px 10px;
}

#playlist{
border:1px solid #444;
height:300px;
overflow:auto;
padding:5px;
}

.item{
padding:4px;
border-bottom:1px solid #333;
cursor:pointer;
}

.item:hover{
background:#333;
}

.playing{
background:#0066cc;
}

</style>
</head>

<body>

<h2>Panel Player</h2>

<input type="file" id="files" multiple accept="video/*">
<button onclick="addFiles()">Agregar archivos</button>

<input type="file" id="folder" webkitdirectory>
<button onclick="addFolder()">Agregar carpeta</button>

<br><br>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>

<label>
Volumen
<input type="range" min="0" max="1" step="0.01" onchange="volume(this.value)">
</label>

<h3>Playlist</h3>

<div id="playlist"></div>

<h3>FX</h3>

<input type="file" id="fxfile" accept="audio/*">
<button onclick="playFX()">Play FX</button>

<script>

let playlist=[]
let playerWindow=null

function send(data){

if(!playerWindow){
playerWindow=window.open("player.html")
}

playerWindow.postMessage(data,"*")

}

function addFiles(){

let files=document.getElementById("files").files

for(let f of files){

playlist.push({
type:"file",
name:f.name,
url:URL.createObjectURL(f)
})

}

render()

send({
type:"playlist",
list:playlist
})

}

function addFolder(){

let files=document.getElementById("folder").files

let arr=[]

for(let f of files){

if(f.type.startsWith("video")){
arr.push(URL.createObjectURL(f))
}

}

playlist.push({
type:"folder",
name:"Carpeta",
files:arr
})

render()

send({
type:"playlist",
list:playlist
})

}

function render(){

let div=document.getElementById("playlist")
div.innerHTML=""

playlist.forEach((p,i)=>{

let d=document.createElement("div")
d.className="item"
d.innerText=p.name || "Carpeta"

d.onclick=()=>{
send({type:"playIndex",index:i})
mark(i)
}

div.appendChild(d)

})

}

function mark(i){

let items=document.querySelectorAll(".item")

items.forEach(e=>e.classList.remove("playing"))

if(items[i]){
items[i].classList.add("playing")
}

}

function next(){
send({type:"next"})
}

function prev(){
send({type:"prev"})
}

function volume(v){
send({type:"volume",value:v})
}

function playFX(){

let f=document.getElementById("fxfile").files[0]

if(!f)return

send({
type:"fx",
url:URL.createObjectURL(f)
})

}

</script>

</body>
</html>
