<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:#0b0b0b;
color:#eee;
font-family:Segoe UI;
padding:10px;
}

button{
background:#2a2a2a;
color:white;
border:none;
padding:5px 8px;
margin:2px;
cursor:pointer;
}

button:hover{
background:#444;
}

#lista{
height:260px;
overflow-y:auto;
border:1px solid #222;
margin-top:8px;
}

.item{
display:flex;
justify-content:space-between;
padding:4px;
border-bottom:1px solid #1a1a1a;
}

.item span{
cursor:pointer;
max-width:230px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.active{
background:#184a8b;
}

.fxbtn{
background:#7a0d0d;
padding:5px;
margin:3px;
cursor:pointer;
}

#previewVideo{
width:100%;
background:black;
}

</style>
</head>

<body>

<h3>Playlist</h3>
<h3>NOW PLAYING</h3>
<div id="nowPlaying" style="color:#6cf;font-size:14px">
ninguno
</div>
<button onclick="cargarVideos()">Videos</button>
<button onclick="cargarCarpeta()">Carpeta</button>
<button onclick="guardarLista()">💾 Guardar Lista</button>
<button onclick="cargarListaArchivo()">📂 Cargar Lista</button>

<input type="file" id="loadList" accept=".json" hidden>
<label>
<input type="checkbox" id="auto" checked>Auto
</label>

<div id="lista"></div>

<h3>Preview</h3>

<video id="previewVideo" controls></video>
<div id="previewName" style="font-size:13px;color:#aaa;margin-top:4px">
sin preview
</div>
<button onclick="mandarAlAire()">CUE → AIR</button>
<button onclick="stopPreview()">STOP</button>

<hr>
<h3>Controles Player</h3>

<button onclick="playerPlay()">▶</button>
<button onclick="playerPause()">⏸</button>
<button onclick="playerStop()">⏹</button>

<button onclick="back10()">⏪ 10s</button>
<button onclick="forward10()">10s ⏩</button>

<br><br>

Volumen
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume(this.value)">
<h3>FX</h3>

<button onclick="cargarFX()">Cargar FX</button>

<div id="fx"></div>

<input type="file" id="files" multiple hidden>
<input type="file" id="folder" webkitdirectory hidden>
<input type="file" id="fxfiles" multiple hidden>

<script>

const canal=new BroadcastChannel("obs_player");

let items=[];
let currentIndex=-1;

let previewItemData=null;

const lista=document.getElementById("lista");
const previewVideo=document.getElementById("previewVideo");
const fxdiv=document.getElementById("fx");

/* =====================
GUARDADO AUTO
===================== */

function guardarLocal(){
localStorage.setItem("playlist", JSON.stringify(items));
localStorage.setItem("currentIndex", currentIndex);
}

function cargarLocal(){

const data = localStorage.getItem("playlist");
const index = localStorage.getItem("currentIndex");

if(data){
items = JSON.parse(data);
}

if(index){
currentIndex = parseInt(index);
}

}

/* =====================
LISTA
===================== */

function actualizarLista(){

lista.innerHTML="";

items.forEach((it,i)=>{

const div=document.createElement("div");
div.className="item";

if(i===currentIndex)
div.classList.add("active");

const span=document.createElement("span");
span.textContent=it.name;

span.onclick=()=>playItem(i);

span.oncontextmenu=e=>{
e.preventDefault();
preview(i);
};

const botones=document.createElement("div");

const up=document.createElement("button");
up.textContent="▲";
up.onclick=()=>{
if(i===0) return;
[items[i],items[i-1]]=[items[i-1],items[i]];
actualizarLista();
guardarLocal();
};

const down=document.createElement("button");
down.textContent="▼";
down.onclick=()=>{
if(i===items.length-1) return;
[items[i],items[i+1]]=[items[i+1],items[i]];
actualizarLista();
guardarLocal();
};

const copy=document.createElement("button");
copy.textContent="⧉";
copy.onclick=()=>{
items.splice(i+1,0,structuredClone(it));
actualizarLista();
guardarLocal();
};

const del=document.createElement("button");
del.textContent="✖";
del.onclick=()=>{
items.splice(i,1);
actualizarLista();
guardarLocal();
};

botones.append(up,down,copy,del);

div.append(span,botones);
lista.appendChild(div);

});

guardarLocal();

}

/* =====================
PLAY
===================== */

function playItem(i){

currentIndex=i;

const it=items[i];

document.getElementById("nowPlaying").textContent = it.name;

if(it.type==="file" && it.file){

canal.postMessage({
type:"playFile",
file:it.file
});

}else if(it.url){

canal.postMessage({
type:"playUrl",
url:it.url
});

}

actualizarLista();

}

/* =====================
PREVIEW
===================== */

function preview(i){

const it=items[i];

if(it.file){

previewVideo.src=URL.createObjectURL(it.file);

previewItemData={
file:it.file,
name:it.file.name
};

}

document.getElementById("previewName").textContent=previewItemData.name;

previewVideo.play();

}

/* =====================
CUE
===================== */

function mandarAlAire(){

if(!previewItemData) return;

document.getElementById("nowPlaying").textContent =
previewItemData.name;

canal.postMessage({
type:"playFile",
file:previewItemData.file
});

}

/* =====================
AUTOPLAY
===================== */

canal.onmessage=e=>{

if(e.data.type==="next"){

currentIndex++;

if(currentIndex>=items.length)
currentIndex=0;

playItem(currentIndex);

}

};

/* =====================
CARGAR VIDEOS
===================== */

function cargarVideos(){
files.click();
}

files.onchange=e=>{

for(const f of e.target.files){

items.push({
type:"file",
name:"🎬 "+f.name,
file:f
});

}

actualizarLista();

};

/* =====================
CARPETA
===================== */

function cargarCarpeta(){
folder.click();
}

folder.onchange=e=>{

const files=[...e.target.files];

const name=files[0].webkitRelativePath.split("/")[0];

items.push({
type:"folder",
name:"📂 "+name,
files:files
});

actualizarLista();

};

/* =====================
FX
===================== */

function cargarFX(){
fxfiles.click();
}

fxfiles.onchange=e=>{

for(const f of e.target.files){

const btn=document.createElement("div");

btn.className="fxbtn";
btn.textContent=f.name;

btn.onclick=()=>{
canal.postMessage({
type:"fx",
file:f
});
};

fxdiv.appendChild(btn);

}

};

/* =====================
CONTROLES
===================== */

function playerPlay(){canal.postMessage({type:"play"});}
function playerPause(){canal.postMessage({type:"pause"});}
function playerStop(){canal.postMessage({type:"stop"});}
function forward10(){canal.postMessage({type:"forward"});}
function back10(){canal.postMessage({type:"back"});}

function setVolume(v){
canal.postMessage({
type:"volume",
value:parseFloat(v)
});
}

/* =====================
GUARDAR / CARGAR ARCHIVO
===================== */

function guardarLista(){

const data = items.map(it => ({
type: it.type,
name: it.name
}));

const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});

const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "playlist.json";
a.click();

}

function cargarListaArchivo(){
loadList.click();
}

loadList.onchange = e => {

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = ev => {

const data = JSON.parse(ev.target.result);

items = [];

data.forEach(it => {
items.push({
type: it.type,
name: it.name
});
});

actualizarLista();

};

reader.readAsText(file);

};

/* =====================
ATAJOS TECLADO
===================== */

document.addEventListener("keydown",e=>{

if(e.target.tagName==="INPUT") return;

switch(e.key){

case " ":
playerPlay();
break;

case "p":
playerPause();
break;

case "s":
playerStop();
break;

case "ArrowRight":
forward10();
break;

case "ArrowLeft":
back10();
break;

case "n":
canal.postMessage({type:"next"});
break;

}

});

/* =====================
INICIO
===================== */

window.onload = () => {
cargarLocal();
actualizarLista();
};

</script>

</body>
</html>
